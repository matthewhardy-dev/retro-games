<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pong | M@H Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0c0a14;--card:#151028;--border:#251e40;--accent:#8b5cf6;--accent-light:#a78bfa;--text:#ede8f5;--text2:#9088a4;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden;touch-action:none;user-select:none;}
        .header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:620px;padding:1rem 0.5rem 0.5rem;}
        .back{color:var(--accent-light);text-decoration:none;font-size:0.8rem;font-weight:600;}
        .back:hover{color:var(--text);}
        .title{font-family:'Press Start 2P',monospace;font-size:0.8rem;color:var(--accent-light);}
        .brand{font-size:0.7rem;color:var(--text2);}
        .mode-bar{display:flex;gap:0.5rem;justify-content:center;padding:0.5rem 0;}
        .mode-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:0.4rem 1rem;border-radius:6px;font-size:0.75rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
        .mode-btn:hover{border-color:var(--accent);}
        .mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
        .scoreboard{display:flex;gap:3rem;justify-content:center;padding:0.5rem;font-family:'Press Start 2P',monospace;font-size:0.7rem;}
        .scoreboard .p1{color:#a78bfa;}
        .scoreboard .p2{color:#10b981;}
        .scoreboard .dash{color:var(--text2);}
        canvas{border:2px solid var(--border);border-radius:8px;background:#0a0818;}
        .msg{font-family:'Press Start 2P',monospace;font-size:0.6rem;color:var(--text2);padding:0.8rem;text-align:center;min-height:2rem;}
        .touch-zones{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;pointer-events:none;}
        .touch-zone{position:absolute;top:0;bottom:0;width:50%;pointer-events:auto;-webkit-tap-highlight-color:transparent;}
        .touch-zone.left{left:0;}
        .touch-zone.right{right:0;}
        @media(hover:none)and(pointer:coarse){.touch-zones{display:block;}}
        @media(max-width:620px){canvas{width:calc(100vw - 20px)!important;height:calc((100vw - 20px)*0.667)!important;}}
    </style>
</head>
<body>
<div class="header">
    <a href="index.html" class="back">← ARCADE</a>
    <div class="title">🏓 PONG</div>
    <div class="brand">M@H</div>
</div>
<div class="mode-bar">
    <button class="mode-btn active" data-mode="ai">vs Computer</button>
    <button class="mode-btn" data-mode="2p">2 Player</button>
</div>
<div class="scoreboard">
    <span class="p1" id="s1">0</span>
    <span class="dash">—</span>
    <span class="p2" id="s2">0</span>
</div>
<canvas id="game" width="600" height="400"></canvas>
<div class="msg" id="msg">W/S or ↑/↓ to move  |  Space to serve</div>
<div class="touch-zones">
    <div class="touch-zone left" id="touchL"></div>
    <div class="touch-zone right" id="touchR"></div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('msg');
const s1El = document.getElementById('s1');
const s2El = document.getElementById('s2');

const W = 600, H = 400;
const PAD_W = 10, PAD_H = 70, BALL_R = 6;
const WIN_SCORE = 7;

let mode = 'ai';
let p1, p2, ball, score1, score2, playing, serving, rallySpeed;

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        fullReset();
        if (mode === '2p') msgEl.textContent = 'P1: W/S  |  P2: ↑/↓  |  Space to serve';
        else msgEl.textContent = 'W/S or \u2191/\u2193 to move  |  Space to serve';
    });
});

function fullReset() {
    score1 = 0; score2 = 0;
    s1El.textContent = '0'; s2El.textContent = '0';
    resetRound();
}

function resetRound() {
    p1 = {x: 15, y: H / 2 - PAD_H / 2, vy: 0};
    p2 = {x: W - 15 - PAD_W, y: H / 2 - PAD_H / 2, vy: 0};
    ball = {x: W / 2, y: H / 2, vx: 0, vy: 0};
    playing = false;
    serving = true;
    rallySpeed = 5;
    draw();
}

function serve() {
    if (!serving) return;
    serving = false;
    playing = true;
    const angle = (Math.random() * 0.8 - 0.4);
    const dir = Math.random() > 0.5 ? 1 : -1;
    ball.vx = dir * rallySpeed * Math.cos(angle);
    ball.vy = rallySpeed * Math.sin(angle);
    msgEl.textContent = '';
}

// Keys
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === ' ') { e.preventDefault(); if (serving) serve(); }
    if (e.key === 'Escape') fullReset();
});
document.addEventListener('keyup', e => keys[e.key] = false);

// Touch controls
let touchLY = null, touchRY = null;
const touchL = document.getElementById('touchL');
const touchR = document.getElementById('touchR');

touchL.addEventListener('touchstart', e => { e.preventDefault(); touchLY = e.touches[0].clientY; if (serving) serve(); });
touchL.addEventListener('touchmove', e => { e.preventDefault(); if (touchLY !== null) { const dy = e.touches[0].clientY - touchLY; p1.y = Math.max(0, Math.min(H - PAD_H, p1.y + dy)); touchLY = e.touches[0].clientY; }});
touchL.addEventListener('touchend', () => touchLY = null);

touchR.addEventListener('touchstart', e => { e.preventDefault(); touchRY = e.touches[0].clientY; if (serving) serve(); });
touchR.addEventListener('touchmove', e => { e.preventDefault(); if (touchRY !== null) { const dy = e.touches[0].clientY - touchRY; if (mode === '2p') { p2.y = Math.max(0, Math.min(H - PAD_H, p2.y + dy)); } else { p1.y = Math.max(0, Math.min(H - PAD_H, p1.y + dy)); } touchRY = e.touches[0].clientY; }});
touchR.addEventListener('touchend', () => touchRY = null);

// Also handle tap on canvas for serve
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (serving) serve(); });

function update() {
    if (!playing) return;

    // Player 1 movement (keyboard)
    const p1Speed = 6;
    if (keys['w'] || keys['W']) p1.y -= p1Speed;
    if (keys['s'] || keys['S']) p1.y += p1Speed;
    p1.y = Math.max(0, Math.min(H - PAD_H, p1.y));

    // Player 2 / AI
    if (mode === '2p') {
        if (keys['ArrowUp']) p2.y -= p1Speed;
        if (keys['ArrowDown']) p2.y += p1Speed;
    } else {
        // AI with slight delay
        const aiCenter = p2.y + PAD_H / 2;
        const diff = ball.y - aiCenter;
        const aiSpeed = Math.min(4.5, rallySpeed * 0.75);
        if (Math.abs(diff) > 8) p2.y += (diff > 0 ? aiSpeed : -aiSpeed);
    }
    p2.y = Math.max(0, Math.min(H - PAD_H, p2.y));

    // Ball movement
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Top/bottom bounce
    if (ball.y - BALL_R <= 0 || ball.y + BALL_R >= H) {
        ball.vy *= -1;
        ball.y = ball.y - BALL_R <= 0 ? BALL_R : H - BALL_R;
    }

    // Paddle collision - P1
    if (ball.vx < 0 && ball.x - BALL_R <= p1.x + PAD_W && ball.x - BALL_R >= p1.x &&
        ball.y >= p1.y && ball.y <= p1.y + PAD_H) {
        const hit = (ball.y - (p1.y + PAD_H / 2)) / (PAD_H / 2);
        rallySpeed = Math.min(rallySpeed + 0.3, 12);
        ball.vx = rallySpeed * Math.cos(hit * 0.7);
        ball.vy = rallySpeed * Math.sin(hit * 0.7);
        ball.x = p1.x + PAD_W + BALL_R;
    }

    // Paddle collision - P2
    if (ball.vx > 0 && ball.x + BALL_R >= p2.x && ball.x + BALL_R <= p2.x + PAD_W &&
        ball.y >= p2.y && ball.y <= p2.y + PAD_H) {
        const hit = (ball.y - (p2.y + PAD_H / 2)) / (PAD_H / 2);
        rallySpeed = Math.min(rallySpeed + 0.3, 12);
        ball.vx = -rallySpeed * Math.cos(hit * 0.7);
        ball.vy = rallySpeed * Math.sin(hit * 0.7);
        ball.x = p2.x - BALL_R;
    }

    // Score
    if (ball.x < -BALL_R) {
        score2++;
        s2El.textContent = score2;
        if (score2 >= WIN_SCORE) { win(2); return; }
        resetRound();
        msgEl.textContent = mode === '2p' ? 'P1: W/S  |  P2: \u2191/\u2193  |  Space to serve' : 'W/S or \u2191/\u2193 to move  |  Space to serve';
    }
    if (ball.x > W + BALL_R) {
        score1++;
        s1El.textContent = score1;
        if (score1 >= WIN_SCORE) { win(1); return; }
        resetRound();
        msgEl.textContent = mode === '2p' ? 'P1: W/S  |  P2: \u2191/\u2193  |  Space to serve' : 'W/S or \u2191/\u2193 to move  |  Space to serve';
    }
}

function win(player) {
    playing = false;
    serving = false;
    const label = mode === 'ai' ? (player === 1 ? 'YOU WIN!' : 'COMPUTER WINS') : `PLAYER ${player} WINS!`;
    msgEl.textContent = `${label} — Press Esc or tap mode to restart`;
}

function draw() {
    // Scale canvas rendering to actual display size
    const rect = canvas.getBoundingClientRect();
    const scaleX = rect.width / W;
    const scaleY = rect.height / H;

    ctx.fillStyle = '#0a0818';
    ctx.fillRect(0, 0, W, H);

    // Center line
    ctx.setLineDash([8, 8]);
    ctx.strokeStyle = 'rgba(139,92,246,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // Paddles
    ctx.shadowColor = '#8b5cf6';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#a78bfa';
    ctx.fillRect(p1.x, p1.y, PAD_W, PAD_H);
    ctx.fillStyle = '#10b981';
    ctx.fillRect(p2.x, p2.y, PAD_W, PAD_H);
    ctx.shadowBlur = 0;

    // Ball
    ctx.fillStyle = '#ede8f5';
    ctx.shadowColor = '#ede8f5';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ball trail
    if (playing) {
        ctx.fillStyle = 'rgba(167,139,250,0.15)';
        ctx.beginPath();
        ctx.arc(ball.x - ball.vx * 1.5, ball.y - ball.vy * 1.5, BALL_R * 0.7, 0, Math.PI * 2);
        ctx.fill();
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

fullReset();
gameLoop();
</script>
</body>
</html>
